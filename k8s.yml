apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookapp-backend
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
      - name: bookapp-backend
        image: 879772956301.dkr.ecr.us-west-1.amazonaws.com/user162-backend:latest
        ports:
        - containerPort: 8080 # Spring Boot 등 백엔드 앱이 사용하는 포트
---
apiVersion: v1
kind: Service
metadata:
  name: bookapp-backend-svc
spec:
  type: LoadBalancer # 외부에서 접속할 수 있도록 주소(URL)를 할당해줍니다.
  selector:
    app: bookapp-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080