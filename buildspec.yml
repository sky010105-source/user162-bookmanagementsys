version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
  build:
    commands:
      # 1. 백엔드 빌드
      - echo "Building Backend..."
      - cd backend
      - chmod +x gradlew
      - ./gradlew clean build -x test
      - cd ..

      # 2. 프론트엔드 빌드
      - echo "Building Frontend..."
      - cd frontend
      - npm install
      # ⚠️ 아래 주소에 EC2의 퍼블릭 IP 또는 도메인을 적어주세요. (포트는 백엔드 포트인 8080)
      - export VITE_API_BASE_URL="http://54.219.60.86:8080"
      - npm run build
      - cd ..

artifacts:
  # CodeDeploy가 가져갈 파일들만 묶어서 S3로 전달합니다.
  files:
    - backend/build/libs/*.jar
    - frontend/dist/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no